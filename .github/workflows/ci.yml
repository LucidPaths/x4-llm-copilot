name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --extra dev --extra mcp
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: Smoke CLI
        run: |
          uv run x4-copilot classify "what are goods selling for in this system"
          uv run x4-copilot providers
          uv run x4-copilot answer "what's selling here" --payload examples/trade_payload.json
          uv run x4-copilot tool trade
          uv run x4-copilot mcp-config
          uv run python -c "from x4_copilot.mcp_server import build_mcp_server; print(type(build_mcp_server()).__name__)"
